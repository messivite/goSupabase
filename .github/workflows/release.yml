name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional release tag (example: v0.1.0). Leave empty for auto-bump."
        required: false
        default: ""
        type: string
      bump:
        description: "Auto-bump type when tag is empty"
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      target:
        description: "Target branch or commit SHA"
        required: false
        default: "main"
        type: string
      make_latest:
        description: "Mark release as latest"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  create_tag:
    name: Create tag (manual only)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.out.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate tag format
        if: ${{ inputs.tag != '' }}
        run: |
          case "${{ inputs.tag }}" in
            v[0-9]*.[0-9]*.[0-9]* ) echo "valid";;
            * ) echo "Tag must match vMAJOR.MINOR.PATCH"; exit 1;;
          esac

      - name: Resolve release tag
        id: resolve
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest="$(git tag --list 'v*' --sort=-version:refname | head -n1)"
          if [ -z "$latest" ]; then
            latest="v0.0.0"
          fi
          ver="${latest#v}"
          IFS='.' read -r major minor patch <<< "$ver"
          major="${major:-0}"
          minor="${minor:-0}"
          patch="${patch:-0}"

          case "${{ inputs.bump }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch|*)
              patch=$((patch + 1))
              ;;
          esac
          echo "tag=v${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists locally: $TAG"
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists on origin: $TAG"
            exit 1
          fi
          git tag "$TAG" "${{ inputs.target }}"
          git push origin "$TAG"

      - name: Output tag
        id: out
        run: echo "tag=${{ steps.resolve.outputs.tag }}" >> "$GITHUB_OUTPUT"

  quality_gate:
    name: Release quality gate
    runs-on: ubuntu-latest
    needs: [create_tag]
    if: always() && (github.event_name == 'push' || needs.create_tag.result == 'success')
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: true

      - name: Verify go.mod/go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -count=1

      - name: Vet
        run: go vet ./...

  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    needs: [create_tag, quality_gate]
    if: always() && needs.quality_gate.result == 'success'
    outputs:
      release_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: true

      - name: Resolve tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ needs.create_tag.outputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binaries
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/gosupabase-linux-amd64 ./cmd/gosupabase
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o dist/gosupabase-linux-arm64 ./cmd/gosupabase
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o dist/gosupabase-darwin-amd64 ./cmd/gosupabase
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o dist/gosupabase-darwin-arm64 ./cmd/gosupabase
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/gosupabase-windows-amd64.exe ./cmd/gosupabase

      - name: Create checksums
        run: |
          cd dist
          shasum -a 256 * > checksums.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/*

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist

      - name: Create release notes
        id: notes
        run: |
          cat > release-notes.md <<'EOF'
          ## goSupaBase Release

          ### Artifacts
          - `gosupabase-linux-amd64`
          - `gosupabase-linux-arm64`
          - `gosupabase-darwin-amd64`
          - `gosupabase-darwin-arm64`
          - `gosupabase-windows-amd64.exe`
          - `checksums.txt`

          ### Install (quick)
          Download the matching binary for your OS and architecture, then:

          ```bash
          chmod +x gosupabase-<os>-<arch>
          mv gosupabase-<os>-<arch> gosupabase
          ```
          EOF

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.release_tag }}
          make_latest: ${{ github.event_name == 'workflow_dispatch' && inputs.make_latest || true }}
          files: dist/*
          body_path: release-notes.md
